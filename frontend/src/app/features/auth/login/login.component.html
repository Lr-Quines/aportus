<aportus-auth-layout subtitle="Controle seus investimentos em um só lugar">
  <input
    aportusInput
    type="email"
    placeholder="E-mail"
    [ngModel]="email()"
    (ngModelChange)="email.set($event)"
    autocomplete="email"
    (keyup.enter)="handleLogin()" />

  <input
    aportusInput
    type="password"
    placeholder="Senha"
    [ngModel]="password()"
    (ngModelChange)="password.set($event)"
    autocomplete="current-password"
    (keyup.enter)="handleLogin()" />

  <button
    class="login-button"
    [class.loading]="isLoading()"
    [disabled]="isLoading()"
    (click)="handleLogin()">
    {{ isLoading() ? 'Entrando...' : 'Entrar' }}
  </button>

  <p class="link" (click)="navigateToRegister()">Criar conta</p>
</aportus-auth-layout>
